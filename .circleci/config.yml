version: 2.1

orbs:
  windows: circleci/windows@5.0
  rust: circleci/rust@1.8.0
  codecov: codecov/codecov@5.4.3
  node: circleci/node@7.1.0

#-----------------------------------------------------------------------------------------------------------------------------

executors:
  node:
    docker:
      - image: node:22.16.0
  mac-aarch64:
    resource_class: macos.m1.medium.gen1 
    macos:
      xcode: 26.3.0
  rust-linux-x86_64:
    docker:
      - image: cimg/rust:1.93.1
    resource_class: large
    environment:
      PIPELINE_NUM: << pipeline.number >>
      TZ: "America/Los_Angeles"
  rust-linux-aarch64:
    docker:
      - image: cimg/rust:1.93.1
    resource_class: arm.medium
    environment:
      PIPELINE_NUM: << pipeline.number >>
      TZ: "America/Los_Angeles"
  ubuntu:
    resource_class: large
    environment:
      PIPELINE_NUM: << pipeline.number >>
      TZ: "America/Los_Angeles"
    machine:
      image: ubuntu-2204:2025.09.1
      docker_layer_caching: true

#-----------------------------------------------------------------------------------------------------------------------------

workflows:
  ci_cd:
    jobs:
      # ---- CI ----
      - check_formatting
      - lua_tests
      - check_license
      - integration_tests
      - unit_tests
      - e2e_tests
      # TODO: can't get this to work, not trying to spend time on it right now since I don't use windows, low priority, will get to it later
      # - build-windows
      # ---- CI Builds (all branches) ----
      - build-linux-x86_64:
          filters:
            branches:
              ignore:
                - main
      - build-linux-aarch64:
          filters:
            branches:
              ignore:
                - main
      - build-mac-aarch64:
          filters:
            branches:
              ignore:
                - main
      - build-mac-x86_64:
          filters:
            branches:
              ignore:
                - main

      # ---- CD (main branch only) ---- 
      - build-linux-x86_64:
          name: build-linux-x86_64-release
          filters:
            branches:
              only:
                - main
          requires:
            - check_formatting
            - lua_tests
            - check_license
            - integration_tests
            - e2e_tests
            - unit_tests
      - build-linux-aarch64:
          name: build-linux-aarch64-release
          filters:
            branches:
              only:
                - main
          requires:
            - check_formatting
            - lua_tests
            - check_license
            - integration_tests
            - e2e_tests
            - unit_tests
      - build-mac-aarch64:
          name: build-mac-aarch64-release
          filters:
            branches:
              only:
                - main
          requires:
            - check_formatting
            - lua_tests
            - check_license
            - integration_tests
            - e2e_tests
            - unit_tests
      - build-mac-x86_64:
          name: build-mac-x86_64-release
          filters:
            branches:
              only:
                - main
          requires:
            - check_formatting
            - lua_tests
            - check_license
            - integration_tests
            - e2e_tests
            - unit_tests
      - release:
          filters:
            branches:
              only: 
                - main
          requires:
            - build-linux-x86_64-release
            - build-linux-aarch64-release
            - build-mac-aarch64-release
            - build-mac-x86_64-release

      # ---- CD (development branch - prereleases) ---- 
      - build-linux-x86_64:
          name: build-linux-x86_64-prerelease
          filters:
            branches:
              only:
                - development
          requires:
            - check_formatting
            - lua_tests
            - check_license
            - integration_tests
            - e2e_tests
            - unit_tests
      - build-linux-aarch64:
          name: build-linux-aarch64-prerelease
          filters:
            branches:
              only:
                - development
          requires:
            - check_formatting
            - lua_tests
            - check_license
            - integration_tests
            - e2e_tests
            - unit_tests
      - build-mac-aarch64:
          name: build-mac-aarch64-prerelease
          filters:
            branches:
              only:
                - development
          requires:
            - check_formatting
            - lua_tests
            - check_license
            - integration_tests
            - e2e_tests
            - unit_tests
      - build-mac-x86_64:
          name: build-mac-x86_64-prerelease
          filters:
            branches:
              only:
                - development
          requires:
            - check_formatting
            - lua_tests
            - check_license
            - integration_tests
            - e2e_tests
            - unit_tests
      - release:
          name: release-prerelease
          filters:
            branches:
              only: 
                - development
          requires:
            - build-linux-x86_64-prerelease
            - build-linux-aarch64-prerelease
            - build-mac-aarch64-prerelease
            - build-mac-x86_64-prerelease

#-----------------------------------------------------------------------------------------------------------------------------

jobs:
  release:
    executor: node
    steps:
      - checkout
      - run:
          name: Install pnpm package manager
          command: npm install -g pnpm
      - run:
          name: Install
          command: pnpm install --frozen-lockfile
      - attach_workspace:
          at: target/release
      - run:
          name: Semantic release
          command: pnpm release

  check_license:
    executor: rust-linux-x86_64
    steps:
      - checkout
      - run:
          name: Install cargo-deny
          command: cargo install --locked cargo-deny
      - run:
          name: Check for license
          command: cargo deny check licenses

  build-linux-x86_64:
    executor: rust-linux-x86_64
    steps:
      - checkout
      - run:
          name: Stable Build for x86_64
          command: cargo build --release
      - run:
          name: Rename binary for architecture
          command: mv target/release/libhermes.so target/release/libhermes-linux-x86_64.so
      - persist_to_workspace:
          root: target/release
          paths:
            - libhermes-linux-x86_64.so

  build-linux-aarch64:
    executor: rust-linux-aarch64
    steps:
      - checkout
      - run:
          name: Stable Build for aarch64
          command: cargo build --release
      - run:
          name: Rename binary for architecture
          command: mv target/release/libhermes.so target/release/libhermes-linux-aarch64.so
      - persist_to_workspace:
          root: target/release
          paths:
            - libhermes-linux-aarch64.so

  build-mac-aarch64:
    executor: mac-aarch64
    steps:
      - checkout
      - run:
          name: Install Rust
          command: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - run:
          name: Build Rust Project for aarch64
          command: cargo build --release
      - run:
          name: Rename binary for architecture
          command: mv target/release/libhermes.dylib target/release/libhermes-macos-aarch64.dylib
      - persist_to_workspace:
          root: target/release
          paths:
            - libhermes-macos-aarch64.dylib

  build-mac-x86_64:
    executor: mac-aarch64
    steps:
      - checkout
      - run:
          name: Install Rosetta 2
          command: softwareupdate --install-rosetta --agree-to-license
      - run:
          name: Install Rust
          command: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - run:
          name: Install x86_64 target
          command: rustup target add x86_64-apple-darwin
      - run:
          name: Build Rust Project for x86_64 (cross-compile)
          command: cargo build --release --target x86_64-apple-darwin
      - run:
          name: Rename binary for architecture
          command: mv target/release/libhermes.dylib target/release/libhermes-macos-x86_64.dylib 2>/dev/null || mv target/x86_64-apple-darwin/release/libhermes.dylib target/release/libhermes-macos-x86_64.dylib
      - persist_to_workspace:
          root: target/release
          paths:
            - libhermes-macos-x86_64.dylib

  check_formatting:
    executor: rust-linux-x86_64
    steps:
      - checkout
      - run:
          name: Check Rust formatting
          command: cargo fmt -- --check
      - run:
          name: Install Lua tooling
          command: |
            # Install selene for Lua linting
            cargo install selene --locked
      - run:
          name: Lint Lua code
          command: |
            selene --config selene.toml lua/ tests/lua/spec/

  unit_tests:
    environment:
      CARGO_TARGET_DIR: target
    executor: ubuntu
    steps:
      - checkout
      - rust/install
      - run:
          name: Install coverage tool
          command: |
            cargo install cargo-llvm-cov@0.6.13
            cargo install cargo-nextest --locked
      - run:
          name: Run unit tests
          command: cargo llvm-cov nextest --bins --lib --all-features --workspace --lcov --output-path unit.coverage.info --ignore-filename-regex 'tests/.*'
      - codecov/upload:
          fail_on_error: true
          files: unit.coverage.info
          git_service: github
          upload_name: unit

  integration_tests:
    environment:
      CARGO_TARGET_DIR: target
      NEOVIM_VERSION: 0.11.6
      TERM: xterm-256color
      LANG: en_US.UTF-8
    executor: ubuntu
    steps:
      - checkout
      - rust/install
      - run:
          name: Install Neovim from tarball
          command: |
            curl -LO https://github.com/neovim/neovim/releases/download/v${NEOVIM_VERSION}/nvim-linux-x86_64.tar.gz
            tar xzf nvim-linux-x86_64.tar.gz
            sudo mv nvim-linux-x86_64 /opt/nvim
            sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim
            nvim --version
      - run:
          name: Install coverage tools
          command: |
            cargo install cargo-llvm-cov@0.6.13
            cargo install cargo-nextest --locked
      - run:
          name: Run integration tests
          command: cargo llvm-cov nextest --manifest-path tests/integration/Cargo.toml --all-features --workspace --lcov --output-path integration.coverage.info --ignore-filename-regex 'tests/.*'
      - codecov/upload:
          fail_on_error: true
          files: integration.coverage.info
          git_service: github
          upload_name: integration

  e2e_tests:
    environment:
      CARGO_TARGET_DIR: target
      NEOVIM_VERSION: 0.11.6
      TERM: xterm-256color
      LANG: en_US.UTF-8
    executor: ubuntu
    steps:
      - checkout
      - rust/install
      - run:
          name: Install Neovim from tarball
          command: |
            curl -LO https://github.com/neovim/neovim/releases/download/v${NEOVIM_VERSION}/nvim-linux-x86_64.tar.gz
            tar xzf nvim-linux-x86_64.tar.gz
            sudo mv nvim-linux-x86_64 /opt/nvim
            sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim
            nvim --version
      - run:
          name: Install coverage tools
          command: |
            cargo install cargo-llvm-cov@0.6.13
      - run:
          name: Install Opencode
          command: curl -fsSL https://opencode.ai/install | bash
      - run:
          name: Install GitHub Copilot
          command: curl -fsSL https://gh.io/copilot-install | bash
      - run:
          name: Run e2e tests
          command: |
            export PATH="/home/circleci/.local/bin:$PATH"
            cargo llvm-cov --manifest-path tests/e2e/Cargo.toml --all-features --workspace --lcov --output-path e2e.coverage.info --ignore-filename-regex 'tests/.*'
      - codecov/upload:
          fail_on_error: true
          files: e2e.coverage.info
          git_service: github
          upload_name: e2e

  lua_tests:
    environment:
      NEOVIM_VERSION: 0.11.6
      TERM: xterm-256color
      LANG: en_US.UTF-8
    executor: ubuntu
    steps:
      - checkout
      - rust/install
      - run:
          name: Install Neovim from tarball
          command: |
            curl -LO https://github.com/neovim/neovim/releases/download/v${NEOVIM_VERSION}/nvim-linux-x86_64.tar.gz
            tar xzf nvim-linux-x86_64.tar.gz
            sudo mv nvim-linux-x86_64 /opt/nvim
            sudo ln -sf /opt/nvim/bin/nvim /usr/local/bin/nvim
            nvim --version
      - run:
          name: Build Hermes binary
          command: cargo build --release
      - run:
          name: Install Lua tools
          command: |
            # Install luarocks
            sudo apt-get update
            sudo apt-get install -y lua5.1 liblua5.1-dev

            wget https://luarocks.org/releases/luarocks-3.9.2.tar.gz
            tar zxpf luarocks-3.9.2.tar.gz
            cd luarocks-3.9.2
            ./configure && make && sudo make install

            # Install vusted for testing and luacov-reporter-lcov for coverage
            eval $(luarocks path --lua-version 5.1 --bin)
            luarocks --lua-version=5.1 install vusted --local
            luarocks --lua-version=5.1 install luacov --local
            luarocks --lua-version=5.1 install luacov-reporter-lcov --local
      - run:
          name: Run Lua tests with coverage
          command: |
            eval $(luarocks path --lua-version 5.1 --bin)
            # Run from project root so that plugin/hermes.lua path resolves correctly
            vusted --coverage -e "package.path = package.path .. ';./tests/lua/?.lua'; package.path = package.path .. ';./tests/lua/spec/?.lua'; package.path = package.path .. ';./lua/?.lua'; package.path = package.path .. ';./lua/?/init.lua'" tests/lua/spec/
      - run:
          name: Generate LCOV coverage report
          command: |
            eval $(luarocks path --lua-version 5.1 --bin)
            # Run from project root where luacov.stats.out was generated
            luacov -c tests/lua/.luacov -r lcov
            mv luacov.report.out lua.coverage.info
      - codecov/upload:
          fail_on_error: false
          files: lua.coverage.info
          git_service: github
          upload_name: lua
